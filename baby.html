<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">
<meta name="referrer" content="no-referrer">
<title>babypedia</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='88'>👶</text></svg>">
<style>
:root {
  --bg: #0c0d0a;
  --fg: #d8d4ca;
  --muted: #7c776c;
  --accent: #b6c084;
  --border: #22241e;
  --error: #c75450;
  --hl: rgba(182, 192, 132, 0.3);
  --code-bg: rgba(255,255,255,0.05);
  --pre-bg: rgba(255,255,255,0.04);
  --hover: rgba(255,255,255,0.025);
  --active: rgba(182,192,132,0.06);
  --th-bg: rgba(255,255,255,0.03);
}
:root[data-theme="light"] {
  --bg: #f6f3ea;
  --fg: #2a2c22;
  --muted: #6e6a5c;
  --accent: #4d6024;
  --border: #d8d2c0;
  --error: #a13c38;
  --hl: rgba(77, 96, 36, 0.18);
  --code-bg: rgba(0,0,0,0.05);
  --pre-bg: rgba(0,0,0,0.03);
  --hover: rgba(0,0,0,0.03);
  --active: rgba(77, 96, 36, 0.08);
  --th-bg: rgba(0,0,0,0.04);
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  background: var(--bg);
  color: var(--fg);
  font: 16px/1.65 ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
  -webkit-font-smoothing: antialiased;
}

#lock {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}
#lock[hidden] { display: none; }
#lock-form {
  display: flex;
  flex-direction: column;
  gap: 14px;
  width: 320px;
  padding: 24px;
}
#lock h1 {
  text-align: center;
  font: 400 12px/1 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--muted);
  margin: 0 0 4px;
  padding-left: 0.4em;
}
#lock-tagline {
  text-align: center;
  font: italic 12px/1.4 ui-serif, "Iowan Old Style", Georgia, serif;
  color: var(--muted);
  opacity: 0.75;
  margin: 0 0 14px;
}
#lock-tagline .latin {
  font-style: normal;
  letter-spacing: 0.05em;
}
#password {
  background: transparent;
  color: var(--fg);
  border: none;
  border-bottom: 1px solid var(--border);
  padding: 10px 4px;
  font: 16px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
  outline: none;
  text-align: center;
  letter-spacing: 0.3em;
  caret-color: var(--accent);
}
#password:focus { border-bottom-color: var(--accent); }
#lock-form button {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  padding: 9px;
  cursor: pointer;
  font: 12px/1 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  transition: color 0.15s, border-color 0.15s;
}
#lock-form button:hover:not(:disabled) { color: var(--accent); border-color: var(--accent); }
#lock-form button:disabled { opacity: 0.5; cursor: wait; }
#lock-error {
  color: var(--error);
  font: 11px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.05em;
  text-align: center;
  margin: 0;
  min-height: 16px;
}

#app {
  display: grid;
  grid-template-rows: auto 1fr;
  height: 100vh;
}
#app[hidden] { display: none; }

#header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}
#header h1 {
  margin: 0;
  font: 12px/1 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--muted);
}
#search {
  flex: 1;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 7px 12px;
  font: 13px/1.2 ui-monospace, "SF Mono", Menlo, monospace;
  outline: none;
  border-radius: 2px;
  min-width: 0;
}
#search:focus { border-color: var(--accent); }
#search::placeholder { color: var(--muted); }
#header button {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 10px;
  cursor: pointer;
  font: 11px/1.2 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  border-radius: 2px;
  flex: 0 0 auto;
}
#header button:hover { color: var(--accent); border-color: var(--accent); }
#nav-btn { display: none; }

#body {
  display: grid;
  grid-template-columns: 280px 1fr;
  overflow: hidden;
  min-height: 0;
}
#app.nav-hidden #nav { display: none; }
#app.nav-hidden #body { grid-template-columns: 1fr; }
#nav-toggle { display: inline-block; }

#nav {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
  overflow: hidden;
  min-height: 0;
}
.nav-panel-header {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
  background: transparent;
  border: 0;
  padding: 12px 18px 8px;
  color: var(--muted);
  font: 500 10px/1 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
  text-align: left;
  flex: 0 0 auto;
}
.nav-panel-header:hover { color: var(--accent); }
.nav-panel-header .chevron { display: inline-block; width: 12px; opacity: 0.6; }

#nav-pages-wrap {
  display: flex;
  flex-direction: column;
  flex: 1 1 auto;
  min-height: 0;
}
#nav-pages-wrap.collapsed { flex: 0 0 auto; }
#nav-pages-wrap.collapsed #nav-pages { display: none; }
#nav-pages {
  flex: 1 1 auto;
  overflow-y: auto;
  min-height: 0;
  padding: 0 0 8px;
}

#nav-sections-wrap {
  display: flex;
  flex-direction: column;
  flex: 0 1 auto;
  min-height: 0;
  max-height: 45%;
  border-top: 1px solid var(--border);
  background: rgba(0,0,0,0.04);
}
:root[data-theme="light"] #nav-sections-wrap { background: rgba(0,0,0,0.025); }
#nav-sections-wrap[hidden] { display: none; }
#nav-sections-wrap.collapsed { flex: 0 0 auto; max-height: none; }
#nav-sections-wrap.collapsed #nav-sections { display: none; }
#nav-sections {
  flex: 1 1 auto;
  overflow-y: auto;
  min-height: 0;
  list-style: none;
  padding: 0 0 12px;
  margin: 0;
}
#nav-sections li { margin: 0; }
#nav-sections a {
  display: block;
  padding: 5px 18px;
  color: var(--muted);
  text-decoration: none;
  border-left: 2px solid transparent;
  font: 12px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
  cursor: pointer;
}
#nav-sections a:hover { color: var(--accent); }
#nav-sections a.active { color: var(--accent); border-left-color: var(--accent); background: var(--active); }
#nav-sections .toc-h3 a { padding-left: 28px; font-size: 11px; }

#tag-filter {
  padding: 8px 18px;
  font: 11px/1.2 ui-monospace, "SF Mono", Menlo, monospace;
  display: flex;
  align-items: center;
  gap: 6px;
  border-bottom: 1px solid var(--border);
  background: var(--active);
  flex-wrap: wrap;
}
#tag-filter[hidden] { display: none; }
.tag-filter-label { color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-size: 10px; }
.tag-filter-name { color: var(--accent); font-weight: 500; }
.tag-filter-clear {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  cursor: pointer;
  font: 12px/1 ui-monospace, "SF Mono", Menlo, monospace;
  padding: 2px 6px;
  border-radius: 2px;
  margin-left: auto;
}
.tag-filter-clear:hover { color: var(--accent); border-color: var(--accent); }

.page-tags {
  margin: -6px 0 22px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tag-chip {
  display: inline-block;
  padding: 3px 10px;
  background: var(--code-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  font: 11px/1.3 ui-monospace, "SF Mono", Menlo, monospace;
  text-decoration: none;
  cursor: pointer;
  letter-spacing: 0.03em;
}
.tag-chip:hover { color: var(--accent); border-color: var(--accent); }
.tag-chip.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.nav-item {
  display: block;
  padding: 9px 18px;
  color: var(--fg);
  text-decoration: none;
  border-left: 2px solid transparent;
  font: 13px/1.4 ui-monospace, "SF Mono", Menlo, monospace;
  cursor: pointer;
}
.nav-item:hover { background: var(--hover); }
.nav-item.active { border-left-color: var(--accent); color: var(--accent); background: var(--active); }
.nav-snippet { color: var(--muted); font-size: 11px; margin-top: 4px; line-height: 1.4; word-break: break-word; }

.nav-cat-header {
  display: block;
  width: 100%;
  text-align: left;
  background: transparent;
  border: 0;
  padding: 16px 14px 6px 14px;
  color: var(--muted);
  font: 500 10px/1 ui-monospace, "SF Mono", Menlo, monospace;
  letter-spacing: 0.3em;
  text-transform: uppercase;
  cursor: pointer;
  user-select: none;
}
.nav-cat-header:hover { color: var(--accent); }
.nav-cat-chevron { display: inline-block; width: 12px; opacity: 0.6; }
.nav-cat.collapsed .nav-cat-items { display: none; }
.nav-cat-items .nav-item { padding-left: 28px; }

mark { background: var(--hl); color: inherit; padding: 0 1px; border-radius: 1px; }
.nav-empty { padding: 20px; color: var(--muted); font: 12px ui-monospace, "SF Mono", monospace; }

#content {
  overflow-y: auto;
  padding: 32px 48px 80px;
  max-width: 760px;
  word-wrap: break-word;
  overflow-wrap: break-word;
}
#content h1 { font: 400 28px/1.3 ui-sans-serif, system-ui, sans-serif; margin: 0 0 18px; }
#content h2 { font: 500 19px/1.3 ui-sans-serif, system-ui, sans-serif; margin: 32px 0 10px; color: var(--accent); }
#content h3 { font: 500 16px/1.3 ui-sans-serif, system-ui, sans-serif; margin: 24px 0 8px; }
#content h4, #content h5, #content h6 { font: 500 14px/1.3 ui-sans-serif, system-ui, sans-serif; margin: 18px 0 6px; color: var(--muted); }
#content h2 .heading-link, #content h3 .heading-link {
  display: inline-block;
  margin-left: 8px;
  color: var(--muted);
  opacity: 0;
  text-decoration: none;
  font-size: 0.7em;
  font-weight: 400;
  cursor: pointer;
  transition: opacity 0.1s;
  vertical-align: middle;
}
#content h2:hover .heading-link, #content h3:hover .heading-link { opacity: 0.55; }
#content .heading-link:hover { opacity: 1 !important; color: var(--accent); }
#content .heading-link.copied { opacity: 1 !important; color: var(--accent); font-weight: 500; }
#content p { margin: 0 0 12px; }
#content a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 3px; }
#content a:hover { text-decoration-color: var(--accent); }
#content ul, #content ol { padding-left: 22px; margin: 0 0 14px; }
#content li { margin: 5px 0; }
#content li input[type=checkbox] { margin-right: 6px; transform: translateY(1px); accent-color: var(--accent); }
#content code { background: var(--code-bg); padding: 1px 5px; border-radius: 2px; font: 0.9em ui-monospace, "SF Mono", Menlo, monospace; }
#content pre { background: var(--pre-bg); padding: 12px 14px; overflow-x: auto; border-radius: 3px; border: 1px solid var(--border); margin: 0 0 14px; }
#content pre code { background: transparent; padding: 0; }
#content blockquote { border-left: 3px solid var(--accent); padding: 4px 12px; color: var(--muted); margin: 14px 0; }
#content hr { border: 0; border-top: 1px solid var(--border); margin: 28px 0; }
#content table { border-collapse: collapse; margin: 0 0 14px; }
#content th, #content td { border: 1px solid var(--border); padding: 6px 12px; text-align: left; }
#content th { background: var(--th-bg); }
#content img { max-width: 100%; display: block; margin: 14px auto 4px; border-radius: 3px; }
#content p:has(> img) + p > em:only-child, #content p > em:only-child { display: block; text-align: center; color: var(--muted); font-size: 13px; }

::selection { background: var(--accent); color: var(--bg); }
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

@media (max-width: 720px) {
  html, body { overflow-x: hidden; }
  #body { grid-template-columns: 1fr; }
  #nav { display: none; border-right: 0; border-bottom: 1px solid var(--border); }
  #app.show-nav #nav { display: flex; }
  #app.show-nav #content { display: none; }
  #content { padding: 18px 14px 60px; }
  #content h1 { font-size: 24px; }
  #content h2 { font-size: 17px; }
  #content table { display: block; max-width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  #content pre { max-width: 100%; }
  #header { gap: 8px; padding: 10px 12px; }
  #header h1 { display: none; }
  #header button { padding: 6px 8px; letter-spacing: 0.15em; }
  #nav-btn { display: block; }
  #nav-toggle { display: none; }
}
</style>
</head>
<body>

<div id="lock">
  <form id="lock-form" autocomplete="off">
    <h1>babypedia</h1>
    <p id="lock-tagline">clean materials, real evidence, <span class="latin">ne quid nimis</span></p>
    <input type="password" id="password" autocomplete="current-password" autofocus spellcheck="false">
    <button type="submit">unlock</button>
    <p id="lock-error"></p>
  </form>
</div>

<div id="app" hidden>
  <div id="header">
    <button id="nav-toggle" type="button" title="show/hide sidebar">≡</button>
    <h1>babypedia</h1>
    <input type="search" id="search" placeholder="search…" autocomplete="off" spellcheck="false">
    <button id="nav-btn" type="button" title="pages">pages</button>
    <button id="theme-btn" type="button" title="toggle theme">◐</button>
    <button id="lock-btn" type="button" title="lock">lock</button>
  </div>
  <div id="body">
    <nav id="nav">
      <div id="nav-pages-wrap">
        <button class="nav-panel-header" id="pages-toggle" type="button">
          <span class="chevron">▾</span> pages
        </button>
        <div id="tag-filter" hidden>
          <span class="tag-filter-label">tag:</span>
          <span class="tag-filter-name"></span>
          <button class="tag-filter-clear" type="button" title="clear filter">×</button>
        </div>
        <div id="nav-pages"></div>
      </div>
      <div id="nav-sections-wrap" hidden>
        <button class="nav-panel-header" id="sections-toggle" type="button">
          <span class="chevron">▾</span> on this page
        </button>
        <ul id="nav-sections"></ul>
      </div>
    </nav>
    <main id="content"></main>
  </div>

<script>
(function () {
  'use strict';

  // ---------- session persistence (survives refresh, cleared on tab close) ----------
  const SESSION_KEY = 'babypedia-session';
  function saveSession(pagesArr, blob) {
    try {
      const fp = blob.salt + ':' + blob.iv;
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({ fp, pages: pagesArr }));
    } catch (e) {}
  }
  function loadSession(blob) {
    try {
      const raw = sessionStorage.getItem(SESSION_KEY);
      if (!raw) return null;
      const data = JSON.parse(raw);
      if (!data || data.fp !== blob.salt + ':' + blob.iv) return null;
      return Array.isArray(data.pages) ? data.pages : null;
    } catch (e) { return null; }
  }
  function clearSession() {
    try { sessionStorage.removeItem(SESSION_KEY); } catch (e) {}
  }

  // ---------- persistent check state ----------
  const CHECK_KEY = 'babypedia-checks';
  let checkStore = {};
  try { checkStore = JSON.parse(localStorage.getItem(CHECK_KEY) || '{}') || {}; } catch (e) {}
  function saveChecks() {
    try { localStorage.setItem(CHECK_KEY, JSON.stringify(checkStore)); } catch (e) {}
  }
  function checkKey(pageId, text) {
    let h = 0;
    const s = String(text);
    for (let i = 0; i < s.length; i++) {
      h = ((h << 5) - h) + s.charCodeAt(i);
      h |= 0;
    }
    return (pageId || '') + ':' + (h >>> 0).toString(36);
  }

  // ---------- theme ----------
  const THEME_KEY = 'babypedia-theme';
  function applyTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    const btn = document.getElementById('theme-btn');
    if (btn) btn.textContent = t === 'light' ? '◑' : '◐';
  }
  (function initTheme() {
    let t = null;
    try { t = localStorage.getItem(THEME_KEY); } catch (e) {}
    if (!t) t = (matchMedia && matchMedia('(prefers-color-scheme: light)').matches) ? 'light' : 'dark';
    applyTheme(t);
  })();

  // ---------- crypto ----------
  const enc = new TextEncoder();
  const dec = new TextDecoder();

  function b64dec(s) {
    const bin = atob(s);
    const buf = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) buf[i] = bin.charCodeAt(i);
    return buf;
  }

  async function deriveKey(password, salt, iter) {
    const baseKey = await crypto.subtle.importKey(
      'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
    );
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', hash: 'SHA-256', salt, iterations: iter },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
  }

  async function decryptBlob(blob, password) {
    const salt = b64dec(blob.salt);
    const iv = b64dec(blob.iv);
    const ct = b64dec(blob.ct);
    const key = await deriveKey(password, salt, blob.iter);
    const pt = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, ct);
    return JSON.parse(dec.decode(pt));
  }

  // ---------- markdown ----------
  function escapeHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  function inline(s) {
    const codes = [];
    s = s.replace(/`([^`]+)`/g, (_, c) => {
      codes.push('<code>' + escapeHtml(c) + '</code>');
      return ' C' + (codes.length - 1) + ' ';
    });
    s = escapeHtml(s);
    s = s.replace(/!\[([^\]]*)\]\(([^)\s]+)\)/g, (_, alt, u) => {
      return '<img alt="' + alt + '" src="' + u + '">';
    });
    s = s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, (_, t, u) => {
      const safe = /^javascript:/i.test(u) ? '#' : u;
      const internal = safe.startsWith('#');
      const attrs = internal ? '' : ' target="_blank" rel="noopener noreferrer"';
      return '<a href="' + safe + '"' + attrs + '>' + t + '</a>';
    });
    s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*\w])\*([^*\n]+)\*(?!\w)/g, '$1<em>$2</em>');
    s = s.replace(/~~(.+?)~~/g, '<del>$1</del>');
    s = s.replace(/ C(\d+) /g, (_, i) => codes[+i]);
    return s;
  }

  function renderMarkdown(md, pageId) {
    const lines = md.replace(/\r\n/g, '\n').split('\n');
    let i = 0;
    let out = '';

    function tableBlock(start) {
      const header = lines[start];
      const sep = lines[start + 1] || '';
      if (!/\|/.test(header) || !/^\s*\|?[\s:|-]+\|?\s*$/.test(sep)) return null;
      const splitRow = r => r.replace(/^\s*\|/, '').replace(/\|\s*$/, '').split('|').map(c => c.trim());
      const headers = splitRow(header);
      const rows = [];
      let j = start + 2;
      while (j < lines.length && /\|/.test(lines[j]) && lines[j].trim() !== '') {
        rows.push(splitRow(lines[j]));
        j++;
      }
      let html = '<table><thead><tr>' +
        headers.map(h => '<th>' + inline(h) + '</th>').join('') +
        '</tr></thead><tbody>';
      for (const r of rows) {
        html += '<tr>' + r.map(c => '<td>' + inline(c) + '</td>').join('') + '</tr>';
      }
      html += '</tbody></table>';
      return { html, end: j };
    }

    while (i < lines.length) {
      const line = lines[i];

      if (line.trim() === '') { i++; continue; }

      let m = line.match(/^(#{1,6})\s+(.*)$/);
      if (m) {
        const level = m[1].length;
        const id = m[2].toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
        out += '<h' + level + ' id="' + id + '">' + inline(m[2]) + '</h' + level + '>';
        i++; continue;
      }

      if (/^---+\s*$/.test(line) || /^\*\*\*+\s*$/.test(line)) {
        out += '<hr>'; i++; continue;
      }

      if (/^```/.test(line)) {
        i++;
        const code = [];
        while (i < lines.length && !/^```/.test(lines[i])) {
          code.push(lines[i]); i++;
        }
        i++;
        out += '<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>';
        continue;
      }

      if (/\|/.test(line) && i + 1 < lines.length && /^\s*\|?[\s:|-]+\|?\s*$/.test(lines[i + 1])) {
        const t = tableBlock(i);
        if (t) { out += t.html; i = t.end; continue; }
      }

      if (line.startsWith('> ')) {
        const buf = [];
        while (i < lines.length && lines[i].startsWith('> ')) {
          buf.push(lines[i].slice(2)); i++;
        }
        out += '<blockquote>' + inline(buf.join(' ')) + '</blockquote>';
        continue;
      }

      if (/^[-*+]\s+/.test(line)) {
        let html = '<ul>';
        while (i < lines.length && /^[-*+]\s+/.test(lines[i])) {
          let item = lines[i].replace(/^[-*+]\s+/, '');
          let prefix = '';
          const cb = item.match(/^\[([ xX])\]\s+(.*)$/);
          if (cb) {
            const sourceChecked = cb[1].toLowerCase() === 'x';
            const key = checkKey(pageId, cb[2]);
            prefix = '<input type="checkbox" data-check="' + key + '" data-src="' + (sourceChecked ? '1' : '0') + '"> ';
            item = cb[2];
          }
          html += '<li>' + prefix + inline(item);
          i++;
          while (i < lines.length && /^\s{2,}\S/.test(lines[i])) {
            html += ' ' + inline(lines[i].trim());
            i++;
          }
          html += '</li>';
        }
        html += '</ul>';
        out += html;
        continue;
      }

      if (/^\d+\.\s+/.test(line)) {
        let html = '<ol>';
        while (i < lines.length && /^\d+\.\s+/.test(lines[i])) {
          html += '<li>' + inline(lines[i].replace(/^\d+\.\s+/, '')) + '</li>';
          i++;
        }
        html += '</ol>';
        out += html;
        continue;
      }

      const para = [];
      while (i < lines.length && lines[i].trim() &&
             !/^(#{1,6}\s|>\s|---+\s*$|\*\*\*+\s*$|```|[-*+]\s|\d+\.\s)/.test(lines[i])) {
        para.push(lines[i]); i++;
      }
      out += '<p>' + inline(para.join(' ')) + '</p>';
    }
    return out;
  }

  // ---------- search ----------
  function search(pages, query) {
    query = query.toLowerCase().trim();
    if (!query) return pages.map((p, idx) => ({ ...p, idx, score: 1, snippet: '' }));
    const out = [];
    const re = new RegExp(escRe(query), 'g');
    pages.forEach((p, idx) => {
      const t = p.title.toLowerCase();
      const c = p.content.toLowerCase();
      let score = 0;
      if (t.includes(query)) score += 10;
      const matches = c.match(re) || [];
      score += matches.length;
      let snippet = '';
      if (matches.length) {
        const j = c.indexOf(query);
        const a = Math.max(0, j - 30);
        const b = Math.min(p.content.length, j + query.length + 60);
        snippet = (a > 0 ? '…' : '') +
          p.content.slice(a, b).replace(/\s+/g, ' ').trim() +
          (b < p.content.length ? '…' : '');
      }
      if (score > 0) out.push({ ...p, idx, score, snippet });
    });
    out.sort((a, b) => b.score - a.score);
    return out;
  }

  function highlight(text, query) {
    if (!query) return escapeHtml(text);
    return escapeHtml(text).replace(new RegExp(escRe(escapeHtml(query)), 'gi'),
      m => '<mark>' + m + '</mark>');
  }

  // ---------- app ----------
  const lockEl = document.getElementById('lock');
  const lockForm = document.getElementById('lock-form');
  const passwordInput = document.getElementById('password');
  const lockError = document.getElementById('lock-error');
  const appEl = document.getElementById('app');
  const navEl = document.getElementById('nav');
  const navPagesEl = document.getElementById('nav-pages');
  const navSectionsEl = document.getElementById('nav-sections');
  const navSectionsWrap = document.getElementById('nav-sections-wrap');
  const contentEl = document.getElementById('content');
  const searchEl = document.getElementById('search');
  const lockBtn = document.getElementById('lock-btn');
  const navBtn = document.getElementById('nav-btn');
  const themeBtn = document.getElementById('theme-btn');

  function setupPanelToggle(buttonId, wrapId, key) {
    const btn = document.getElementById(buttonId);
    const wrap = document.getElementById(wrapId);
    const chev = btn.querySelector('.chevron');
    const apply = collapsed => {
      wrap.classList.toggle('collapsed', collapsed);
      if (chev) chev.textContent = collapsed ? '▸' : '▾';
    };
    let initial = false;
    try { initial = localStorage.getItem(key) === '1'; } catch (e) {}
    apply(initial);
    btn.addEventListener('click', () => {
      const next = !wrap.classList.contains('collapsed');
      apply(next);
      try { localStorage.setItem(key, next ? '1' : '0'); } catch (e) {}
    });
  }
  setupPanelToggle('pages-toggle', 'nav-pages-wrap', 'babypedia-pages-collapsed');
  setupPanelToggle('sections-toggle', 'nav-sections-wrap', 'babypedia-sections-collapsed');

  const navToggleBtn = document.getElementById('nav-toggle');
  const NAV_HIDDEN_KEY = 'babypedia-nav-hidden';
  (function initNavHidden() {
    let v = false;
    try { v = localStorage.getItem(NAV_HIDDEN_KEY) === '1'; } catch (e) {}
    if (v) appEl.classList.add('nav-hidden');
  })();
  navToggleBtn.addEventListener('click', () => {
    const next = !appEl.classList.contains('nav-hidden');
    appEl.classList.toggle('nav-hidden', next);
    try { localStorage.setItem(NAV_HIDDEN_KEY, next ? '1' : '0'); } catch (e) {}
  });

  let pages = [];
  let currentId = null;
  let currentQuery = '';
  let currentTagFilter = null;
  const collapsedCats = new Set();
  let tocObserver = null;

  function buildToc() {
    if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
    navSectionsEl.innerHTML = '';
    const headings = contentEl.querySelectorAll('h2, h3');
    if (headings.length < 2) {
      navSectionsWrap.hidden = true;
      return;
    }
    navSectionsWrap.hidden = false;
    headings.forEach(h => {
      const li = document.createElement('li');
      if (h.tagName === 'H3') li.classList.add('toc-h3');
      const a = document.createElement('a');
      a.href = '#' + h.id;
      a.textContent = h.textContent;
      a.dataset.target = h.id;
      li.appendChild(a);
      navSectionsEl.appendChild(li);
    });
    if ('IntersectionObserver' in window) {
      tocObserver = new IntersectionObserver(entries => {
        for (const entry of entries) {
          if (entry.isIntersecting) {
            const id = entry.target.id;
            navSectionsEl.querySelectorAll('a').forEach(l => l.classList.toggle('active', l.dataset.target === id));
          }
        }
      }, { root: contentEl, rootMargin: '-10% 0px -75% 0px' });
      headings.forEach(h => tocObserver.observe(h));
    }
  }

  function getBlob() {
    const raw = document.getElementById('encrypted-data').textContent;
    const inner = raw
      .replace(/^[\s\S]*?\/\*ENC_BEGIN\*\//, '')
      .replace(/\/\*ENC_END\*\/[\s\S]*$/, '')
      .trim();
    return JSON.parse(inner);
  }

  function navItemHtml(p) {
    const active = p.id === currentId ? ' active' : '';
    const title = currentQuery
      ? escapeHtml(p.title).replace(new RegExp(escRe(escapeHtml(currentQuery)), 'gi'),
          m => '<mark>' + m + '</mark>')
      : escapeHtml(p.title);
    const snippet = p.snippet
      ? '<div class="nav-snippet">' + highlight(p.snippet, currentQuery) + '</div>'
      : '';
    return '<a class="nav-item' + active + '" href="#' + encodeURIComponent(p.id) +
      '" data-id="' + escapeHtml(p.id) + '"><div>' + title + '</div>' + snippet + '</a>';
  }

  const tagFilterEl = document.getElementById('tag-filter');
  const tagFilterNameEl = document.querySelector('.tag-filter-name');
  function setTagFilter(tag) {
    currentTagFilter = tag;
    tagFilterEl.hidden = false;
    tagFilterNameEl.textContent = tag;
    renderNav();
  }
  function clearTagFilter() {
    currentTagFilter = null;
    tagFilterEl.hidden = true;
    renderNav();
  }
  document.querySelector('.tag-filter-clear').addEventListener('click', clearTagFilter);

  function addPageTags(page) {
    if (!page.tags || !page.tags.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'page-tags';
    page.tags.forEach(tag => {
      const a = document.createElement('a');
      a.className = 'tag-chip';
      a.dataset.tag = tag;
      a.textContent = tag;
      a.href = '#';
      if (tag === currentTagFilter) a.classList.add('active');
      wrap.appendChild(a);
    });
    const h1 = contentEl.querySelector('h1');
    if (h1) h1.insertAdjacentElement('afterend', wrap);
    else contentEl.insertBefore(wrap, contentEl.firstChild);
  }

  contentEl.addEventListener('click', e => {
    const chip = e.target.closest('.tag-chip');
    if (!chip) return;
    e.preventDefault();
    if (chip.dataset.tag === currentTagFilter) clearTagFilter();
    else setTagFilter(chip.dataset.tag);
  });

  function renderNav() {
    let pool = pages;
    if (currentTagFilter) {
      pool = pages.filter(p => Array.isArray(p.tags) && p.tags.includes(currentTagFilter));
    }
    const results = search(pool, currentQuery);
    if (!results.length) {
      navPagesEl.innerHTML = '<div class="nav-empty">no matches</div>';
      return;
    }
    const noCat = [];
    const cats = new Map(); // preserve insertion order
    for (const p of results) {
      if (p.category) {
        if (!cats.has(p.category)) cats.set(p.category, []);
        cats.get(p.category).push(p);
      } else {
        noCat.push(p);
      }
    }
    let html = '';
    for (const p of noCat) html += navItemHtml(p);
    for (const [cat, items] of cats) {
      const isCollapsed = !currentQuery && collapsedCats.has(cat);
      const chevron = isCollapsed ? '▸' : '▾';
      html += '<div class="nav-cat' + (isCollapsed ? ' collapsed' : '') + '" data-cat="' + escapeHtml(cat) + '">';
      html += '<button class="nav-cat-header" type="button"><span class="nav-cat-chevron">' + chevron + '</span> ' + escapeHtml(cat) + '</button>';
      html += '<div class="nav-cat-items">';
      for (const p of items) html += navItemHtml(p);
      html += '</div></div>';
    }
    navPagesEl.innerHTML = html;
  }

  function parseHash() {
    const raw = decodeURIComponent((location.hash || '').slice(1));
    if (!raw) return { pageId: '', sectionId: '' };
    const idx = raw.indexOf('/');
    if (idx === -1) return { pageId: raw, sectionId: '' };
    return { pageId: raw.slice(0, idx), sectionId: raw.slice(idx + 1) };
  }

  function makeHash(pageId, sectionId) {
    const h = '#' + encodeURIComponent(pageId);
    return sectionId ? h + '/' + encodeURIComponent(sectionId) : h;
  }

  function addHeadingLinks(pageId) {
    contentEl.querySelectorAll('h2, h3').forEach(h => {
      if (!h.id || h.querySelector('.heading-link')) return;
      const link = document.createElement('a');
      link.className = 'heading-link';
      link.href = makeHash(pageId, h.id);
      link.textContent = '¶';
      link.title = 'copy link to this section';
      link.dataset.section = h.id;
      h.appendChild(link);
    });
  }

  function scrollToSection(sectionId) {
    if (!sectionId) return;
    const target = contentEl.querySelector('#' + CSS.escape(sectionId));
    if (target) target.scrollIntoView({ block: 'start' });
  }

  function renderPage(id, sectionId) {
    const page = pages.find(p => p.id === id);
    if (!page) {
      contentEl.innerHTML = '<p style="color:var(--muted)">page not found</p>';
      return;
    }
    currentId = id;
    contentEl.innerHTML = renderMarkdown(page.content, id);
    contentEl.querySelectorAll('input[type="checkbox"][data-check]').forEach(cb => {
      const k = cb.dataset.check;
      cb.checked = (k in checkStore) ? !!checkStore[k] : (cb.dataset.src === '1');
    });
    addPageTags(page);
    addHeadingLinks(id);
    contentEl.scrollTop = 0;
    buildToc();
    const targetHash = makeHash(id, sectionId);
    if (location.hash !== targetHash) {
      history.replaceState(null, '', targetHash);
    }
    if (sectionId) scrollToSection(sectionId);
    renderNav();
    appEl.classList.remove('show-nav');
  }

  navEl.addEventListener('click', e => {
    const header = e.target.closest('.nav-cat-header');
    if (header) {
      e.preventDefault();
      const wrap = header.closest('.nav-cat');
      const cat = wrap.dataset.cat;
      if (collapsedCats.has(cat)) collapsedCats.delete(cat);
      else collapsedCats.add(cat);
      wrap.classList.toggle('collapsed');
      const chev = header.querySelector('.nav-cat-chevron');
      if (chev) chev.textContent = wrap.classList.contains('collapsed') ? '▸' : '▾';
      return;
    }
    const a = e.target.closest('.nav-item');
    if (!a) return;
    e.preventDefault();
    renderPage(a.dataset.id);
  });

  searchEl.addEventListener('input', e => {
    currentQuery = e.target.value;
    renderNav();
  });

  contentEl.addEventListener('change', e => {
    const cb = e.target;
    if (cb.matches && cb.matches('input[type="checkbox"][data-check]')) {
      checkStore[cb.dataset.check] = cb.checked;
      saveChecks();
    }
  });

  document.addEventListener('click', e => {
    const a = e.target.closest('a[data-target]');
    if (!a) return;
    e.preventDefault();
    const target = contentEl.querySelector('#' + CSS.escape(a.dataset.target));
    if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    if (currentId) {
      history.replaceState(null, '', makeHash(currentId, a.dataset.target));
    }
  });

  contentEl.addEventListener('click', e => {
    const link = e.target.closest('.heading-link');
    if (!link) return;
    e.preventDefault();
    const fullUrl = location.origin + location.pathname + link.getAttribute('href');
    const sectionId = link.dataset.section;
    if (currentId && sectionId) {
      history.replaceState(null, '', makeHash(currentId, sectionId));
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(fullUrl).then(() => {
        link.classList.add('copied');
        const orig = link.textContent;
        link.textContent = '✓';
        setTimeout(() => {
          link.textContent = orig;
          link.classList.remove('copied');
        }, 1200);
      }).catch(() => {});
    }
  });

  navBtn.addEventListener('click', () => {
    appEl.classList.toggle('show-nav');
  });

  themeBtn.addEventListener('click', () => {
    const cur = document.documentElement.getAttribute('data-theme') || 'dark';
    const next = cur === 'light' ? 'dark' : 'light';
    applyTheme(next);
    try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
  });

  lockBtn.addEventListener('click', () => {
    clearSession();
    pages = [];
    currentId = null;
    currentQuery = '';
    currentTagFilter = null;
    tagFilterEl.hidden = true;
    collapsedCats.clear();
    if (tocObserver) { tocObserver.disconnect(); tocObserver = null; }
    appEl.hidden = true;
    lockEl.hidden = false;
    passwordInput.value = '';
    contentEl.innerHTML = '';
    navPagesEl.innerHTML = '';
    navSectionsEl.innerHTML = '';
    navSectionsWrap.hidden = true;
    searchEl.value = '';
    history.replaceState(null, '', location.pathname);
    passwordInput.focus();
  });

  lockForm.addEventListener('submit', async e => {
    e.preventDefault();
    lockError.textContent = '';
    const password = passwordInput.value;
    if (!password) return;

    let blob;
    try { blob = getBlob(); }
    catch (err) { lockError.textContent = 'corrupt blob'; return; }
    if (blob.placeholder) {
      lockError.textContent = 'no content — run encrypt_baby.py';
      return;
    }

    const btn = lockForm.querySelector('button');
    btn.disabled = true;
    btn.textContent = 'unlocking…';
    try {
      const data = await decryptBlob(blob, password);
      pages = (data.pages || []).map(p => ({
        id: String(p.id),
        title: String(p.title || p.id),
        content: String(p.content || ''),
        category: p.category ? String(p.category) : null,
        tags: Array.isArray(p.tags) ? p.tags.map(String) : []
      }));
      saveSession(pages, blob);
      passwordInput.value = '';
      lockEl.hidden = true;
      appEl.hidden = false;
      const { pageId: requested, sectionId } = parseHash();
      const initial = pages.find(p => p.id === requested) ? requested : (pages[0] && pages[0].id);
      if (initial) renderPage(initial, sectionId);
      else { contentEl.innerHTML = '<p>no pages</p>'; renderNav(); }
    } catch (err) {
      lockError.textContent = 'wrong password';
      passwordInput.select();
    } finally {
      btn.disabled = false;
      btn.textContent = 'unlock';
    }
  });

  window.addEventListener('hashchange', () => {
    if (appEl.hidden) return;
    const { pageId, sectionId } = parseHash();
    if (!pageId) return;
    if (pageId === currentId) {
      if (sectionId) scrollToSection(sectionId);
    } else if (pages.find(p => p.id === pageId)) {
      renderPage(pageId, sectionId);
    }
  });

  document.addEventListener('keydown', e => {
    if (appEl.hidden) return;
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      searchEl.focus();
      searchEl.select();
    } else if (e.key === 'Escape' && document.activeElement === searchEl) {
      searchEl.value = '';
      currentQuery = '';
      renderNav();
    }
  });

  if (!window.crypto || !window.crypto.subtle) {
    document.body.innerHTML =
      '<p style="text-align:center;padding:40px;color:#c75450;font-family:ui-monospace,monospace">' +
      'browser does not support Web Crypto (need https or localhost)</p>';
    return;
  }

  (function tryRestoreSession() {
    let blob;
    try { blob = getBlob(); } catch (e) { return; }
    if (blob.placeholder) return;
    const cached = loadSession(blob);
    if (!cached || !cached.length) return;
    pages = cached.map(p => ({
      id: String(p.id),
      title: String(p.title || p.id),
      content: String(p.content || ''),
      category: p.category ? String(p.category) : null,
      tags: Array.isArray(p.tags) ? p.tags.map(String) : []
    }));
    lockEl.hidden = true;
    appEl.hidden = false;
    const { pageId: requested, sectionId } = parseHash();
    const initial = pages.find(p => p.id === requested) ? requested : (pages[0] && pages[0].id);
    if (initial) renderPage(initial, sectionId);
    else { contentEl.innerHTML = '<p>no pages</p>'; renderNav(); }
  })();
})();
</script>

</body>
</html>
